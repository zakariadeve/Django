{% extends 'base.html' %}

{% block content %}

<style>
    .contact-container {
        width: 400px;
        margin: 50px auto;
        padding: 25px;
        border-radius: 12px;
        background-color: #f9f9f9;
        box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        font-family: Arial, sans-serif;
    }

    .contact-container h2 {
        text-align: center;
        margin-bottom: 20px;
    }

    .contact-container input,
    .contact-container textarea {
        width: 100%;
        padding: 10px;
        margin-bottom: 15px;
        border: 1px solid #ccc;
        border-radius: 8px;
        font-size: 14px;
    }

    .contact-container textarea {
        resize: none;
        height: 120px;
    }

    .contact-container button {
        width: 100%;
        padding: 10px;
        border: none;
        background-color: #007BFF;
        color: white;
        font-size: 16px;
        border-radius: 8px;
        cursor: pointer;
        transition: 0.3s;
    }

    .contact-container button:hover {
        background-color: #0056b3;
    }

    .success-message {
        text-align: center;
        color: green;
        margin-bottom: 15px;
        font-weight: bold;
    }
</style>

<div class="contact-container">
    <h2>📩 Contact</h2>

    {% if success %}
        <p class="success-message">Message envoyé avec succès !</p>
    {% endif %}

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Envoyer</button>
    </form>
</div>

{% endblock %}
