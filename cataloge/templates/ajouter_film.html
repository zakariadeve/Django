{% extends 'base.html' %}

{% block content %}
<style>
    /* ===== Container ===== */
.form-container {
    width: 420px;
    margin: 60px auto;
    padding: 25px;
    background: #ffffff;
    border-radius: 12px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    font-family: Arial, sans-serif;
}

/* ===== Title ===== */
.title {
    text-align: center;
    margin-bottom: 20px;
    color: #222;
    font-size: 22px;
}

/* ===== Form fields ===== */
.film-form p {
    margin-bottom: 15px;
}

.film-form input,
.film-form select,
.film-form textarea {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
    border: 1px solid #ddd;
    border-radius: 6px;
    outline: none;
    transition: 0.3s;
    font-size: 14px;
}

.film-form input:focus,
.film-form select:focus,
.film-form textarea:focus {
    border-color: #4CAF50;
    box-shadow: 0 0 6px rgba(76,175,80,0.3);
}

/* ===== Button ===== */
.btn-submit {
    width: 100%;
    padding: 12px;
    background: #4CAF50;
    color: white;
    border: none;
    border-radius: 6px;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

.btn-submit:hover {
    background: #45a049;
}
</style>

<div class="form-container">
    <h2 class="title">🎬 Ajouter un film</h2>

    <form method="POST" class="film-form">
        {% csrf_token %}

        {{ form.as_p }}

        <button type="submit" class="btn-submit">
            Ajouter
        </button>
    </form>
</div>

{% endblock %}
