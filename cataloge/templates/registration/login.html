{% extends 'base.html' %}


{% block content %}
<style>
    .login-container {
        width: 400px;
        margin: 50px auto;
        padding: 25px;
        border-radius: 12px;
        background-color: #f9f9f9;
        box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        font-family: Arial, sans-serif;
    }

    .login-container h2 {
        text-align: center;
        margin-bottom: 20px;
    }

    .login-container input {
        width: 100%;
        padding: 10px;
        margin-bottom: 15px;
        border: 1px solid #ccc;
        border-radius: 8px;
        font-size: 14px;
    }

    .login-container button {
        width: 100%;
        padding: 10px;
        border: none;
        background-color: #007BFF;
        color: white;
        font-size: 16px;
        border-radius: 8px;
        cursor: pointer;
        transition: 0.3s;
    }

    .login-container button:hover {
        background-color: #0056b3;
    }
</style>
<div class="login-container">
    <h2>Login</h2>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Login</button>
    </form>
</div>

{% endblock %}
